- title: Atmospheric circulation conditions during major flood events
  question: What were the atmospheric circulation conditions during 'Billion Dollar Disaster' flood events in the U.S? Does climate change affect the occurrence of these conditions?
  description: The goal of this research is to characterize the atmospheric circulation patterns that led to major flood events in the U.S, and to compare and contrast the causes of these flood events. Initially, this research is focused on floods that occurred in the Midwest region and caused over $1 billion in damage. Once these patterns have been identified, I will use climate model simulations to understand whether these conditions are becoming more or less frequent with climate change. This research will help us understand how major floods are changing, so that we better adapt to future flooding. 
  figure: ../assets/img/precip_circulation_fig.png
  caption: "Figure: 500 millibar geopotential height anomalies on June 8, 1993, a day with heavy precipitation over the Midwest region. Precipitation during June and July 1993 caused major flooding over the Midwest." 

- title: Economic costs of extreme precipitation and flooding
  question: How have increases in precipitation affected the cost of flood damages in the United States?  
  description: The cost of flooding has been increasing across the U.S. In this project, I use observations of flood damage and precipitation to model the relationship between precipitation and flood damage in the U.S. over the recent past (1988-2017). I also examine how this relationship varies regionally and seasonally, and the difference in flood damages that result from short-duration (<5-day) vs. long-duration (monthly) extreme precipitation. Because extreme precipitation events have been getting more intense, I use these statistical models to estimate the increased cost of flood damages due to the observed increases in precipitation. I am also using an ensemble of climate model simulations to determine how changes in extreme precipitation will affect the cost of flood damages in the future.
  figure: ../assets/img/flood_damages_fig.png
  caption: "Figure: Trends in flood damages in each state from 1988 to 2017. The cost of flood damages has increased for most states, even after accounting for changes in inflation and wealth."
  
- title: Snowmelt- vs. rain-driven flooding in the Western U.S. 
  question: How does flooding in mountainous regions change when more winter precipitation falls as rain instead of snow? 
  description: "In this project, I used daily streamflow data from USGS stream gages to quantify changes in flooding in response to changes in the snow fraction of precipitation. I used a panel regression to estimate this relationship across 480 watersheds, while controlling for differences between watersheds that affect flooding (such as drainage area, topography, vegetation, etc.). Panel regression analysis is a common econometric method that has only recently been applied to hydrology. This analysis showed that the empirical relationship between snow fraction and streamflow is approximately exponential, with rain-dominated precipitation leading to a proportionately larger streamflow response than snow-dominated or mixed rain-and-snow precipitation. Additionally, we found that the largest rain-driven floods are >2.5 times the size of the largest snowmelt-driven floods. This research suggests that in a warmer climate, most watersheds, particularly warmer or mixed-regime watersheds, could experience non-linear increases in winter flood risk as a higher percentage of precipitation falls as rain. <br/><br/> This research was <a href='https://agupubs.onlinelibrary.wiley.com/doi/full/10.1029/2019WR025571' target='_blank'>published in Water Resources Research</a> and was covered in the media: <a href='https://news.stanford.edu/2020/01/27/rain-less-snow-increases-flooding' target='_blank'>more rain and less snow means increased flood risk</a>. I am also quoted on panel regression methods in hydrology in <a href='https://www.circleofblue.org/2020/world/flood-study-with-fresh-approach-measures-downside-of-pavement/' target='_blank'>this news article</a>."
  figure: ../assets/img/snow_flood_fig.png
  caption: "Figure: (A) Change in winter (Nov-March) rain percentage for each watershed from 1980-2016. (B) Change in winter rain percentage based on watershed elevation and latitude. (C) Response of streamflow to changes in precipitation event rain percentage, calculated using a piecewise linear regression (purple indicates 95% confidence interval). The left (right) axis shows the change in streamflow relative to 0% (100%) rain events."

